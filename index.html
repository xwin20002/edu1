<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國語教學駕駛艙 ｜ 翰林版一下 第7-10課</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --board:#1a2a1a; --board-light:#243524; --chalk:#e8e4d8; --chalk-dim:#a8a498; --yellow:#ffd54f; --wood:#8d6e4a; --wood-dark:#5d4530; --wood-light:#a8875a; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:var(--board);color:var(--chalk);min-height:100vh}
    header{background:linear-gradient(180deg,var(--wood-light) 0%,var(--wood) 40%,var(--wood-dark) 100%);padding:22px 28px 18px;box-shadow:0 4px 16px rgba(0,0,0,.5);border-bottom:3px solid #3a2a1a}
    header h1{font-size:1.5rem;font-weight:900;text-shadow:1px 1px 3px rgba(0,0,0,.5)}
    header .meta{font-size:.82rem;opacity:.85;margin-top:6px}
    .badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:2px 10px;font-size:.72rem;margin-right:6px}
    .container{max-width:900px;margin:0 auto;padding:40px 20px 80px}
    h2{font-size:1.1rem;color:var(--yellow);margin-bottom:20px;padding-bottom:8px;border-bottom:2px dashed var(--yellow)}
    .lessons{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
    .lesson-card{background:var(--board-light);border:2px solid rgba(232,228,216,.2);border-radius:14px;padding:24px 22px;text-decoration:none;color:var(--chalk);display:block;transition:all .25s;box-shadow:inset 0 0 20px rgba(0,0,0,.3)}
    .lesson-card:hover{border-color:var(--yellow);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .lesson-card .num{font-size:.75rem;color:var(--chalk-dim);margin-bottom:8px}
    .lesson-card .emoji{font-size:2.4rem;margin-bottom:10px;display:block}
    .lesson-card h3{font-size:1.25rem;font-weight:700;margin-bottom:8px}
    .lesson-card .theme{font-size:.82rem;color:var(--chalk-dim);margin-bottom:14px}
    .lesson-card .chars{display:flex;flex-wrap:wrap;gap:4px}
    .char-chip{background:rgba(255,213,79,.1);border:1px dashed var(--yellow);border-radius:6px;padding:2px 8px;font-size:.78rem;color:var(--yellow)}
    .go-btn{display:inline-block;margin-top:16px;background:var(--yellow);color:#1a1a1a;border-radius:20px;padding:6px 18px;font-size:.82rem;font-weight:700}
  </style>
</head>
<body>
  <header>
    <h1>📚 國語教學駕駛艙</h1>
    <div class="meta"><span class="badge">翰林版</span><span class="badge">一年級下學期</span><span class="badge">114學年度</span> 第 7–10 課</div>
  </header>
  <div class="container">
    <h2>📖 選擇課程</h2>
    <div class="lessons">
      <a href="L7/index.html" class="lesson-card">
        <div class="num">第 7 課</div><span class="emoji">✏️</span>
        <h3>借筆</h3><div class="theme">尊重與友誼</div>
        <div class="chars"><span class="char-chip">借</span><span class="char-chip">筆</span><span class="char-chip">著急</span><span class="char-chip">高興</span><span class="char-chip">整</span><span class="char-chip">背</span></div>
        <span class="go-btn">進入課程 →</span>
      </a>
      <a href="L8/index.html" class="lesson-card">
        <div class="num">第 8 課</div><span class="emoji">💌</span>
        <h3>兩張卡片</h3><div class="theme">道歉與友誼</div>
        <div class="chars"><span class="char-chip">兩</span><span class="char-chip">教</span><span class="char-chip">室</span><span class="char-chip">桌</span><span class="char-chip">忍</span><span class="char-chip">忽然</span></div>
        <span class="go-btn">進入課程 →</span>
      </a>
      <a href="L9/index.html" class="lesson-card">
        <div class="num">第 9 課</div><span class="emoji">🤝</span>
        <h3>友情的枴杖</h3><div class="theme">互助與關懷</div>
        <div class="chars"><span class="char-chip">得</span><span class="char-chip">覺</span><span class="char-chip">健康</span><span class="char-chip">步</span><span class="char-chip">力量</span></div>
        <span class="go-btn">進入課程 →</span>
      </a>
      <a href="L10/index.html" class="lesson-card">
        <div class="num">第 10 課</div><span class="emoji">🌱</span>
        <h3>一棵小樹</h3><div class="theme">勇敢成長</div>
        <div class="chars"><span class="char-chip">樹</span><span class="char-chip">打雷</span><span class="char-chip">勇</span><span class="char-chip">敢</span><span class="char-chip">這</span><span class="char-chip">棵</span></div>
        <span class="go-btn">進入課程 →</span>
      </a>
    </div>
  </div>
</body>
</html>
